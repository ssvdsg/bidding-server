<svg xmlns="http://www.w3.org/2000/svg">
  <!-- 公文包 (商务) + 星星 (二次元) -->
  <symbol id="briefcase-icon" viewBox="0 0 24 24">
    <path fill="none" stroke="#1a1a2e" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 10h18v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-9z"/>
    <path fill="none" stroke="#1a1a2e" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
    <path fill="none" stroke="#ff6b9d" stroke-linecap="round" stroke-width="1.5" d="M12 14v2" opacity="0.7"/>
    <!-- 迷你星星装饰 -->
    <path fill="#fbbf24" d="M16 4.5l.45 1.38h1.46l-1.18.86.45 1.38-1.18-.86-1.18.86.45-1.38-1.18-.86h1.46L16 4.5z" opacity="0.8"/>
  </symbol>

  <!-- 图表上升 (商务) -->
  <symbol id="chart-icon" viewBox="0 0 24 24">
    <path fill="none" stroke="#1a1a2e" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 20h16"/>
    <path fill="none" stroke="#1a1a2e" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 16l4-6 4 4 4-8"/>
    <!-- 粉色圆点装饰 -->
    <circle cx="18" cy="6" r="1.5" fill="#ff6b9d" opacity="0.7"/>
  </symbol>

  <!-- 文档 (商务) -->
  <symbol id="document-icon" viewBox="0 0 24 24">
    <path fill="none" stroke="#1a1a2e" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"/>
    <path fill="none" stroke="#1a1a2e" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14 2v6h6"/>
    <path fill="none" stroke="#1a1a2e" stroke-linecap="round" stroke-width="1.5" d="M8 13h8M8 17h5"/>
    <!-- 粉色书签装饰 -->
    <path fill="#ff6b9d" opacity="0.6" d="M12 20l-2-1-2 1v-4h4v4z"/>
  </symbol>

  <!-- 搜索 (商务 → 招标搜索) -->
  <symbol id="search-icon" viewBox="0 0 24 24">
    <circle cx="11" cy="11" r="7" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
    <path fill="none" stroke="#1a1a2e" stroke-linecap="round" stroke-width="1.5" d="M16.5 16.5l4 4"/>
    <!--星星搜索结果装饰 -->
    <path fill="#fbbf24" d="M7 8l.3.92h.97l-.78.57.3.92-.78-.57-.79.57.3-.92-.78-.57h.97L7 8z" opacity="0.6"/>
  </symbol>

  <!-- 星星 (二次元核心) -->
  <symbol id="star-icon" viewBox="0 0 24 24">
    <path fill="#fbbf24" stroke="#f59e0b" stroke-width="0.5" d="M12 2l2.4 7.4H22l-6.1 4.4 2.3 7.1L12 16.3l-6.2 4.6 2.3-7.1L2 9.4h7.6L12 2z"/>
    <!-- 小闪光 -->
    <circle cx="18" cy="5" r="1" fill="#ff6b9d" opacity="0.7"/>
    <circle cx="6" cy="19" r="0.8" fill="#ff6b9d" opacity="0.5"/>
  </symbol>

  <!-- 通知铃铛 (商务) + 二次元心形 -->
  <symbol id="bell-icon" viewBox="0 0 24 24">
    <path fill="none" stroke="#1a1a2e" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
    <path fill="none" stroke="#1a1a2e" stroke-linecap="round" stroke-width="1.5" d="M13.73 21a2 2 0 0 1-3.46 0"/>
    <!-- 粉色心形装饰 -->
    <path fill="#ff6b9d" opacity="0.6" d="M19 3c-.83 0-1.5.67-1.5 1.5 0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5c0-.83-.67-1.5-1.5-1.5z"/>
  </symbol>

  <!-- 设置齿轮 (商务) -->
  <symbol id="settings-icon" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="3" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
    <path fill="none" stroke="#1a1a2e" stroke-width="1.5" d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    <!-- 粉色装饰 -->
    <circle cx="6" cy="6" r="1.2" fill="#ff6b9d" opacity="0.5"/>
  </symbol>

  <!-- AI 机器人 (二次元) -->
  <symbol id="robot-icon" viewBox="0 0 24 24">
    <rect x="4" y="7" width="16" height="12" rx="2" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>
    <circle cx="9" cy="12" r="1" fill="#1a1a2e"/>
    <circle cx="15" cy="12" r="1" fill="#1a1a2e"/>
    <path fill="none" stroke="#1a1a2e" stroke-linecap="round" stroke-width="1.5" d="M9 15c.64.67 1.68 1 3 1s2.36-.33 3-1"/>
    <path fill="none" stroke="#1a1a2e" stroke-linecap="round" stroke-width="1.5" d="M12 2v5M8 3l2 4M16 3l-2 4"/>
    <!-- 粉色腮红 (二次元!) -->
    <circle cx="8" cy="13" r="1.5" fill="#ff6b9d" opacity="0.3"/>
    <circle cx="16" cy="13" r="1.5" fill="#ff6b9d" opacity="0.3"/>
  </symbol>
</svg>
